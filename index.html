<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Which draft works better? — a 10-minute reading study</title>
<meta name="robots" content="noindex">
<style>
  :root {
    --surface-1: #fcfcfb; --page: #f9f9f7; --ink: #0b0b0b; --ink-2: #52514e;
    --muted: #898781; --grid: #e1e0d9; --baseline: #c3c2b7; --border: rgba(11,11,11,0.10);
    --accent: #2a78d6;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --surface-1: #1a1a19; --page: #0d0d0d; --ink: #ffffff; --ink-2: #c3c2b7;
      --muted: #898781; --grid: #2c2c2a; --baseline: #383835; --border: rgba(255,255,255,0.10);
      --accent: #3987e5;
    }
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--page); color: var(--ink);
         font-family: system-ui, -apple-system, "Segoe UI", sans-serif; line-height: 1.55; }
  .wrap { max-width: 860px; margin: 0 auto; padding: 28px 20px 64px; }
  h1 { font-size: 1.45rem; margin: 0 0 10px; }
  .card { background: var(--surface-1); border: 1px solid var(--border); border-radius: 10px; padding: 20px; margin-top: 16px; }
  .muted { color: var(--ink-2); font-size: 0.93rem; }
  .progress { font-size: 0.82rem; color: var(--muted); margin-bottom: 8px; }
  .versions { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin: 14px 0 6px; }
  @media (max-width: 700px) { .versions { grid-template-columns: 1fr; } }
  .version { background: var(--page); border: 1px solid var(--grid); border-radius: 8px; padding: 14px; }
  .version .tag { font-weight: 700; font-size: 0.8rem; letter-spacing: 0.06em; color: var(--accent); margin-bottom: 6px; }
  .version .text { white-space: pre-wrap; font-size: 0.96rem; }
  .q { margin-top: 16px; padding-top: 12px; border-top: 1px solid var(--grid); }
  .q p { margin: 0 0 8px; font-weight: 600; font-size: 0.95rem; }
  .opts { display: flex; gap: 8px; flex-wrap: wrap; }
  .opts label {
    border: 1px solid var(--baseline); border-radius: 7px; padding: 7px 14px;
    cursor: pointer; font-size: 0.9rem; user-select: none;
  }
  .opts input { position: absolute; opacity: 0; pointer-events: none; }
  .opts label:has(input:checked) { background: var(--accent); border-color: var(--accent); color: #fff; }
  button {
    font: inherit; font-size: 0.95rem; margin-top: 18px;
    background: var(--accent); color: #fff; border: none; border-radius: 8px;
    padding: 10px 20px; cursor: pointer; font-weight: 600;
  }
  button:disabled { opacity: 0.45; cursor: not-allowed; }
  button.secondary { background: var(--surface-1); color: var(--ink); border: 1px solid var(--baseline); }
  textarea { width: 100%; min-height: 90px; font: inherit; font-size: 0.92rem; padding: 10px;
             background: var(--page); color: var(--ink); border: 1px solid var(--grid); border-radius: 8px; }
  pre.out { background: var(--page); border: 1px solid var(--grid); border-radius: 8px;
            padding: 12px; font-size: 0.78rem; overflow-x: auto; white-space: pre-wrap; word-break: break-all; }
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<script>var STUDY_PAIRS=[{"id":"readme-example","original":"This innovative solution empowers creators to unlock their full potential with seamless content protection.","revision":"Before you send important work to someone else, save a clear record of the version you shared. Strong writing matters, but so does the record that shows what you had and when."},{"id":"ex1-corporate-polish","original":"Our cutting-edge platform empowers users to seamlessly unlock new levels of productivity and drive transformative results at scale.","revision":"This tool helps small teams cut their weekly reporting time from a few hours to about thirty minutes. You connect your spreadsheet once, and the weekly summary builds itself."},{"id":"ex2-stiff-email","original":"Per my previous correspondence, kindly be advised that the requisite deliverables remain outstanding. Your immediate attention to this matter would be greatly appreciated. Please do not hesitate to revert at your earliest convenience.","revision":"Hi Sam,\n\nFollowing up on my note from last week — I still need the two budget files we discussed. Could you send them by Thursday so I can finish the report on time?\n\nThanks, and let me know if anything is holding it up.\n\nMaria"},{"id":"ex3-motivational-fluff","original":"Believe in yourself and the universe will conspire to help you. Every single day is a brand new chance to chase your dreams and become the limitless version of you that you were always meant to be. You've got this!","revision":"Motivation fades faster than most people expect, so build something that runs without it. Pick one small task you can repeat daily — ten minutes of writing, one sales email, a single revision — and do it on the days you don't feel like it. The habit carries you when the feeling doesn't."},{"id":"ex4-creator-education","original":"In today's fast-paced digital landscape, content creators must leverage powerful strategies to maximize their reach and unlock unprecedented growth across all platforms. Consistency is key to success!","revision":"If you are just starting out, pick one platform and one format, and post on a schedule you can actually keep. Two posts a week you can sustain will teach you more than seven you burn out on by month two. Watch which posts people respond to, then make more of those."},{"id":"ex5-training-abstractions","original":"The system facilitates the optimization of your workflow through the utilization of automated processes which enable enhanced operational efficiency throughout the entirety of the procedure.","revision":"Here's what the system does for you: once you set it up, it handles the repetitive steps automatically. You enter the order details once, and it fills in the shipping form, updates the inventory count, and emails the customer a confirmation. You only step in if something looks wrong."},{"id":"t1-structure-no-texture","original":"The policy update will improve operational workflows by increasing compliance alignment and enhancing communication efficiency across departments.","revision":"The policy update gives each department the same communication steps, so fewer messages get missed and teams know what to do next."},{"id":"t2-texture-no-structure","original":"Look, nobody wants to open another confusing email and feel like they just walked into somebody else's mess. That's why this update matters.","revision":"This update gives you one clear process for handling customer follow-ups, so you do not have to guess which message, form, or deadline comes next."},{"id":"t5-ai-polished","original":"In today's fast-paced world, creators need innovative solutions that empower them to protect their work and maximize their creative potential.","revision":"Before you share important work, keep a record of the version you sent. That way, if questions come up later, you are not relying on memory alone."},{"id":"t6-list-no-reader","original":"Step one is intake. Step two is review. Step three is revision. Step four is final approval. Step five is distribution.","revision":"Start with intake so the request is clear. Then review the draft, revise what failed, approve the final version, and send it only after the details are checked."},{"id":"t7-voice-no-control","original":"Some drafts walk in loud, wearing perfume, acting like they solved the problem, but when you look closer, they forgot to bring the actual point.","revision":"Some drafts sound confident but do not say enough. Before you polish the voice, make sure the point is clear and the reader knows what to do next."},{"id":"t8-formal-email","original":"Please be advised that the requested documentation must be submitted at your earliest convenience to prevent potential processing delays.","revision":"Please send the requested documents as soon as you can so we can avoid delays in processing."},{"id":"t9-manual-voice","original":"Users should ensure all relevant information is entered accurately before proceeding to the subsequent step in the process.","revision":"Before you move to the next step, check that the information you entered is complete and accurate."},{"id":"t10-motivational-slogan","original":"Consistency is the key to unlocking your creative destiny and becoming the version of yourself you were always meant to be.","revision":"A missed day does not erase the habit. Go back the next day and make the step small enough to repeat."}];var STUDY_CATCH="Before you send the draft, check the structure first. Make sure the reader knows the point, the order makes sense, and the next step is clear. Then check the human lane: does it sound natural, grounded, and written for a real person?";</script>
<script>
(function () {
  "use strict";
  var app = document.getElementById("app");
  var TRIALS_PER_PERSON = 8;

  var QUESTIONS = [
    { key: "clarity", text: "If this message were sent to you, which version would leave you more certain what it means and what to do next?" },
    { key: "human",   text: "Which version sounds more like it was written by a person paying attention to you?" },
    { key: "trust",   text: "Which version would you trust more?" }
  ];

  var pairs = STUDY_PAIRS;

  var catchText = STUDY_CATCH;
  function scramble(text) {
    var w = text.split(/\s+/);
    for (var i = w.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var t = w[i]; w[i] = w[j]; w[j] = t;
    }
    return w.join(" ");
  }

  function shuffle(arr) {
    var a = arr.slice();
    for (var i = a.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var t = a[i]; a[i] = a[j]; a[j] = t;
    }
    return a;
  }

  // Build this participant's session.
  var chosen = shuffle(pairs).slice(0, TRIALS_PER_PERSON).map(function (p) {
    return { id: p.id, isCatch: false, original: p.original, revision: p.revision,
             revisionIs: Math.random() < 0.5 ? "A" : "B" };
  });
  var catchTrial = { id: "attention-check", isCatch: true,
                     original: scramble(catchText), revision: catchText,
                     revisionIs: Math.random() < 0.5 ? "A" : "B" };
  var trials = chosen.slice();
  trials.splice(Math.floor(Math.random() * (trials.length + 1)), 0, catchTrial);

  var code = "R" + Math.random().toString(36).slice(2, 8).toUpperCase();
  var record = { study: "reader-study-v1", participant: code,
                 startedAt: new Date().toISOString(), trials: [], comment: "" };
  var idx = 0;

  function esc(s) { return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }

  function intro() {
    app.innerHTML =
      '<h1>Which draft works better?</h1>' +
      '<div class="card">' +
      '<p>You will see <strong>9 short messages</strong>, each in two versions, A and B. ' +
      'For each one, answer three quick questions about which version works better for you as a reader. ' +
      'There are no right answers — go with your honest reaction. It takes about 10 minutes.</p>' +
      '<p class="muted">This study is anonymous. Nothing is collected automatically and nothing leaves this page — ' +
      'at the end you will get a small block of text with your answers to send back to the person who gave you this link. ' +
      'Aggregated results will be published in a public research repository. ' +
      'By continuing, you agree to take part.</p>' +
      '<button id="start">Start</button></div>';
    document.getElementById("start").onclick = trial;
  }

  function trial() {
    if (idx >= trials.length) return comment();
    var t = trials[idx];
    var aText = t.revisionIs === "A" ? t.revision : t.original;
    var bText = t.revisionIs === "B" ? t.revision : t.original;
    var qHtml = QUESTIONS.map(function (q, qi) {
      return '<div class="q"><p>' + (qi + 1) + ". " + q.text + '</p><div class="opts">' +
        ['A', 'B', 'No real difference'].map(function (opt) {
          return '<label><input type="radio" name="q' + qi + '" value="' + opt + '">' + opt + "</label>";
        }).join("") + "</div></div>";
    }).join("");
    app.innerHTML =
      '<div class="progress">Message ' + (idx + 1) + " of " + trials.length + "</div>" +
      '<div class="card"><div class="versions">' +
      '<div class="version"><div class="tag">VERSION A</div><div class="text">' + esc(aText) + "</div></div>" +
      '<div class="version"><div class="tag">VERSION B</div><div class="text">' + esc(bText) + "</div></div>" +
      "</div>" + qHtml +
      '<button id="next" disabled>Next</button></div>';
    var next = document.getElementById("next");
    app.addEventListener("change", function check() {
      var done = QUESTIONS.every(function (_, qi) {
        return app.querySelector('input[name="q' + qi + '"]:checked');
      });
      next.disabled = !done;
    });
    next.onclick = function () {
      var answers = {};
      QUESTIONS.forEach(function (q, qi) {
        var v = app.querySelector('input[name="q' + qi + '"]:checked').value;
        answers[q.key] = v === "No real difference" ? "tie" : (v === t.revisionIs ? "rev" : "orig");
      });
      record.trials.push({ pairId: t.id, isCatch: t.isCatch, revisionWas: t.revisionIs,
                           clarity: answers.clarity, human: answers.human, trust: answers.trust });
      idx++;
      trial();
    };
  }

  function comment() {
    app.innerHTML =
      '<h1>Almost done</h1><div class="card">' +
      '<p>Anything stand out about the versions you preferred — or the ones you didn’t? (Optional.)</p>' +
      '<textarea id="cmt" placeholder="Optional"></textarea>' +
      '<button id="finish">Finish</button></div>';
    document.getElementById("finish").onclick = function () {
      record.comment = document.getElementById("cmt").value.trim();
      record.finishedAt = new Date().toISOString();
      done();
    };
  }

  function done() {
    var blob = JSON.stringify(record);
    app.innerHTML =
      '<h1>Thank you!</h1><div class="card">' +
      '<p><strong>Last step:</strong> copy the block below and send it back to the person who gave you this link ' +
      "(message or email — whatever is easiest). That block is your anonymous answers; nothing was sent automatically.</p>" +
      '<button id="copy">Copy my answers</button> ' +
      '<button class="secondary" id="show">Show the block</button>' +
      '<pre class="out" id="out" hidden></pre>' +
      '<p class="muted">What this was: one version of each message had been rewritten using a public editing method. ' +
      "Your answers help test whether the rewrites actually read better for real people. " +
      "Results will be published in aggregate, never individually. Thank you for helping.</p></div>";
    var out = document.getElementById("out");
    out.textContent = blob;
    document.getElementById("show").onclick = function () { out.hidden = !out.hidden; };
    document.getElementById("copy").onclick = function () {
      navigator.clipboard.writeText(blob).then(function () {
        document.getElementById("copy").textContent = "Copied ✓";
      }, function () { out.hidden = false; });
    };
  }

  intro();
})();
</script>
</body>
</html>
